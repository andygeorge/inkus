---
- name: Check if kubeadm has already been initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init

- name: Initialize control plane
  command: >
    kubeadm init
    --apiserver-advertise-address={{ ansible_host }}
    --pod-network-cidr=10.244.0.0/16
    --node-name={{ inventory_hostname }}
  when: not kubeadm_init.stat.exists

- name: Create .kube directory
  file:
    path: "/home/{{ ssh_user }}/.kube"
    state: directory
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0755"

- name: Copy admin.conf to user kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ssh_user }}/.kube/config"
    remote_src: true
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0600"

- name: Check if flannel is already deployed
  command: kubectl --kubeconfig=/etc/kubernetes/admin.conf get daemonset -n kube-flannel kube-flannel-ds
  register: flannel_check
  failed_when: false
  changed_when: false

- name: Deploy flannel CNI
  command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf apply
    -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
  when: flannel_check.rc != 0

- name: Generate join command for workers
  command: kubeadm token create --print-join-command
  register: join_command
  changed_when: false

- name: Store join command as fact
  set_fact:
    kubeadm_join_command: "{{ join_command.stdout }}"

- name: Fetch kubeconfig to host
  fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/../kubeconfig"
    flat: true
